site_name: "cita.kz - AI Agents Documentation"
site_url: https://anurgaz.github.io/cita-agents/
site_dir: site

theme:
  name: material
  language: ru
  palette:
    scheme: slate
    primary: teal
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight

nav:
  - Главная: index.md
  - Контекст:
    - Глоссарий: context/glossary.md
    - Ограничения: context/constraints.md
    - Матрица решений: context/decision-matrix.md
    - Стек: context/tech-stack.md
  - Бизнес-правила:
    - Бронирование: business-rules/booking-rules.md
    - Расписание: business-rules/scheduling-rules.md
    - Уведомления: business-rules/notification-rules.md
    - Отмены: business-rules/cancellation-rules.md
  - Интеграции:
    - Telegram Bot: integrations/telegram-bot.md
    - Telegram Mini App: integrations/telegram-miniapp.md
    - 2GIS: integrations/2gis.md
  - Данные:
    - Словарь данных: data/data-dictionary.md
  - Артефакты:
    - User Stories: artifacts/user-stories/index.md
    - API Спеки: artifacts/api-specs/index.md
    - Тест-кейсы: artifacts/test-cases/index.md
    - How-to Guides: artifacts/how-to-guides/index.md
    - API Reference: artifacts/api-reference/index.md
    - Changelog: artifacts/changelog/index.md
    - Bug Reports: artifacts/bug-reports/index.md
  - Агенты:
    - BA Agent: agents/ba-agent/profile.md
    - SA Agent: agents/sa-agent/profile.md
    - TW Agent: agents/tw-agent/profile.md
    - CS Agent: agents/cs-agent/profile.md

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - plantuml_markdown:
      format: svg

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
