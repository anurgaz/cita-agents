site_name: "cita.kz - AI Agents Documentation"
site_url: https://anurgaz.github.io/cita-agents/
theme:
  name: material
  language: ru
  palette:
    scheme: slate
    primary: teal
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight

nav:
  - Главная: index.md
  - Контекст:
    - Глоссарий: docs/context/glossary.md
    - Ограничения: docs/context/constraints.md
    - Матрица решений: docs/context/decision-matrix.md
    - Стек: docs/context/tech-stack.md
  - Бизнес-правила:
    - Бронирование: docs/business-rules/booking-rules.md
    - Расписание: docs/business-rules/scheduling-rules.md
    - Уведомления: docs/business-rules/notification-rules.md
    - Отмены: docs/business-rules/cancellation-rules.md
  - Интеграции:
    - Telegram Bot: docs/integrations/telegram-bot.md
    - Telegram Mini App: docs/integrations/telegram-miniapp.md
    - 2GIS: docs/integrations/2gis.md
  - Данные:
    - Словарь данных: docs/data/data-dictionary.md
  - Артефакты:
    - User Stories: docs/artifacts/user-stories/index.md
    - API Спеки: docs/artifacts/api-specs/index.md
    - Тест-кейсы: docs/artifacts/test-cases/index.md
    - How-to Guides: docs/artifacts/how-to-guides/index.md
    - API Reference: docs/artifacts/api-reference/index.md
    - Changelog: docs/artifacts/changelog/index.md
    - Bug Reports: docs/artifacts/bug-reports/index.md
  - Агенты:
    - BA Agent: agents/ba-agent/profile.md
    - SA Agent: agents/sa-agent/profile.md
    - TW Agent: agents/tw-agent/profile.md
    - CS Agent: agents/cs-agent/profile.md

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
