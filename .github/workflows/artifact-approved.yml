name: Artifact Approved

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  publish:
    if: >
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved' &&
       contains(github.event.pull_request.labels.*.name, 'artifact'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/approve') &&
       contains(github.event.issue.labels.*.name, 'artifact'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -X POST -f content='rocket'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        run: gh pr merge ${{ steps.pr.outputs.number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract CIT number
        id: cit
        run: |
          TITLE=$(gh pr view ${{ steps.pr.outputs.number }} --json title --jq '.title' 2>/dev/null || echo "")
          CIT_NUM=$(echo "$TITLE" | grep -oP 'CIT-\K[0-9]+')
          echo "number=$CIT_NUM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Paperclip status
        uses: appleboy/ssh-action@v1
        with:
          host: 159.69.28.60
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CITA_COMPANY_ID="ed133e66-a694-470e-8e94-4ea412647ce5"
            docker exec paperclip-db-1 psql -U paperclip -d paperclip -c \
              "UPDATE issues SET status = 'published', completed_at = now(), updated_at = now() WHERE company_id = '$CITA_COMPANY_ID' AND issue_number = ${{ steps.cit.outputs.number }};"
