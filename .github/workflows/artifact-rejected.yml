name: Artifact Rejected - Re-run Agent

on:
  pull_request_review:
    types: [submitted]

jobs:
  retry:
    if: >
      github.event.review.state == 'changes_requested' &&
      contains(github.event.pull_request.labels.*.name, 'artifact')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract info from PR
        id: info
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          CIT_NUM=$(echo "$TITLE" | grep -oP 'CIT-\K[0-9]+')
          AGENT=$(echo "$TITLE" | grep -oP '\[\K[A-Z]+(?=\])' | tr '[:upper:]' '[:lower:]')
          echo "cit_number=$CIT_NUM" >> $GITHUB_OUTPUT
          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Collect review feedback
        id: feedback
        run: |
          REVIEW_BODY="${{ github.event.review.body }}"
          echo "$REVIEW_BODY" > /tmp/feedback.txt
          echo "Feedback:"
          cat /tmp/feedback.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close current PR
        run: |
          gh pr close ${{ github.event.pull_request.number }} --comment "Автоматический re-run агента с учётом фидбэка. Новый PR будет создан."
          git push origin --delete ${{ steps.info.outputs.branch }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-run agent on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 159.69.28.60
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/cita-agents
            export ANTHROPIC_API_KEY=$(cat /root/.anthropic_key)

            CITA_COMPANY_ID="ed133e66-a694-470e-8e94-4ea412647ce5"
            ORIGINAL_TASK=$(docker exec paperclip-db-1 psql -U paperclip -d paperclip -t -A -c               "SELECT title FROM issues WHERE company_id = '$CITA_COMPANY_ID' AND issue_number = ${{ steps.info.outputs.cit_number }};" 2>/dev/null)

            TASK=$(echo "$ORIGINAL_TASK" | sed 's/^\[[A-Z]*\] //')

            docker exec paperclip-db-1 psql -U paperclip -d paperclip -c               "UPDATE issues SET status = 'in_progress', updated_at = now() WHERE company_id = '$CITA_COMPANY_ID' AND issue_number = ${{ steps.info.outputs.cit_number }};"

            ./pipeline/run-agent.sh               --agent ${{ steps.info.outputs.agent }}               --task "${TASK}"               --feedback "${{ github.event.review.body }}"
